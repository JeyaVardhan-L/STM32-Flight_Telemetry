<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STM32 Flight Dynamics</title>
    
    <!-- Premium UI Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            /* Monotonic Dark Theme */
            --bg-base: #09090b;
            --bg-surface: #18181b;
            --bg-surface-hover: #27272a;
            --border-color: #3f3f46;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --accent-glow: #22d3ee; /* Sleek Cyan */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Top Navigation Bar */
        #navbar {
            height: 70px;
            background-color: var(--bg-surface);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--border-color);
            transition: all 0.3s ease;
        }

        .status-dot.active {
            background-color: var(--accent-glow);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .controls { display: flex; gap: 15px; }

        /* Smooth UI Elements */
        select, button {
            background-color: var(--bg-base);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
        }

        select:hover, button:hover {
            border-color: var(--text-muted);
            background-color: var(--bg-surface-hover);
        }

        button.primary {
            background-color: var(--text-main);
            color: var(--bg-base);
            border: none;
        }

        button.primary:hover {
            background-color: white;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #btnCalibrate { display: none; }

        /* Main Workspace */
        #workspace {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            height: calc(100vh - 70px);
        }

        /* Fluid Graph Panel */
        #telemetry-panel {
            width: 380px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .graph-block {
            flex: 1;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .graph-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            z-index: 2;
        }

        .graph-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .graph-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .canvas-wrapper {
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 3D Viewport */
        #render-panel {
            flex: 1;
            background: radial-gradient(circle at center, #18181b 0%, #09090b 100%);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #render-panel canvas {
            display: block;
            outline: none;
        }
    </style>
</head>
<body>

    <div id="navbar">
        <div class="brand">
            <div id="statusIndicator" class="status-dot"></div>
            STM32 DYNAMICS
        </div>
        <div class="controls">
            <select id="modelSelect">
                <option value="drone">Quadcopter</option>
                <option value="satellite">Satellite</option> <!-- Replaced Airplane -->
                <option value="rocket">Launch Vehicle</option>
                <option value="slab">Hardware Workbench</option>
            </select>
            <button id="btnCalibrate">Tare Axis</button>
            <button id="btnConnect" class="primary">Initialize UART</button>
        </div>
    </div>

    <div id="workspace">
        <div id="telemetry-panel">
            <div class="graph-block">
                <div class="graph-header">
                    <span class="graph-title">Pitch (X)</span>
                    <span class="graph-value" id="valPitch">0.0°</span>
                </div>
                <div class="canvas-wrapper"><canvas id="chartPitch"></canvas></div>
            </div>
            <div class="graph-block">
                <div class="graph-header">
                    <span class="graph-title">Roll (Y)</span>
                    <span class="graph-value" id="valRoll">0.0°</span>
                </div>
                <div class="canvas-wrapper"><canvas id="chartRoll"></canvas></div>
            </div>
            <div class="graph-block">
                <div class="graph-header">
                    <span class="graph-title">Yaw (Z)</span>
                    <span class="graph-value" id="valYaw">0.0°</span>
                </div>
                <div class="canvas-wrapper"><canvas id="chartYaw"></canvas></div>
            </div>
        </div>
        
        <div id="render-panel">
            <!-- 3D Canvas injects here -->
        </div>
    </div>

    <script>
        // --- 1. SETUP 3D SCENE ---
        const container = document.getElementById('render-panel');
        const scene = new THREE.Scene();
        
        // Minimalist Grid
        const gridHelper = new THREE.GridHelper(40, 40, 0x27272a, 0x18181b);
        gridHelper.position.y = -3;
        scene.add(gridHelper);

        const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000); 
        camera.position.set(0, 5, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio); 
        container.appendChild(renderer.domElement);

        // High-Contrast Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        // --- THE GUARANTEED SIZING FIX ---
        function resize3D() {
            const rect = container.getBoundingClientRect();
            let w = rect.width;
            let h = rect.height;
            if (w === 0 || h === 0) { w = 800; h = 600; } 
            renderer.setSize(w, h);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        }
        window.addEventListener('resize', resize3D);
        setTimeout(resize3D, 100);

        // --- UPGRADED PROCEDURAL 3D MODELS ---
        const matBody = new THREE.MeshPhongMaterial({ color: 0xe4e4e7, shininess: 80 });
        const matDark = new THREE.MeshPhongMaterial({ color: 0x27272a });
        const matAccent = new THREE.MeshPhongMaterial({ color: 0x22d3ee, emissive: 0x083344 });
        
        // Specific Hardware Materials
        const matPCBBlue = new THREE.MeshPhongMaterial({ color: 0x1e3a8a }); // Blue Pill color
        const matGold = new THREE.MeshPhongMaterial({ color: 0xeab308 }); // Header pins
        const matProp = new THREE.MeshPhongMaterial({ color: 0x22d3ee, transparent: true, opacity: 0.4 }); // Glassy props

        function createDrone() {
            const group = new THREE.Group();
            
            // X-Frame Arms
            const armGeo = new THREE.CylinderGeometry(0.1, 0.1, 4.5, 16);
            const arm1 = new THREE.Mesh(armGeo, matDark);
            arm1.rotation.y = Math.PI / 4;
            arm1.rotation.z = Math.PI / 2;
            const arm2 = new THREE.Mesh(armGeo, matDark);
            arm2.rotation.y = -Math.PI / 4;
            arm2.rotation.z = Math.PI / 2;
            
            // Central Hub
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.3, 1.2), matDark);
            const dome = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 16, 0, Math.PI*2, 0, Math.PI/2), matBody);
            dome.position.y = 0.15;

            group.add(body, dome, arm1, arm2);

            // Motors & Props
            const dist = 1.6;
            const positions = [[-dist,-dist], [dist,dist], [-dist,dist], [dist,-dist]];
            positions.forEach(pos => {
                let motor = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.4, 16), matDark);
                motor.position.set(pos[0], 0.1, pos[1]);
                let prop = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.9, 0.02, 16), matProp);
                prop.position.set(pos[0], 0.35, pos[1]);
                group.add(motor, prop);
            });
            group.rotation.order = "YXZ"; 
            return group;
        }

        // NEW: Satellite Model (Replacing Airplane)
        function createSatellite() {
            const group = new THREE.Group();
            
            // Central Bus
            const bus = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.5), matBody);
            
            // Solar Arrays
            const panelGeo = new THREE.BoxGeometry(4, 0.05, 1.2);
            const panel1 = new THREE.Mesh(panelGeo, matAccent);
            panel1.position.set(2.6, 0, 0);
            const panel2 = new THREE.Mesh(panelGeo, matAccent);
            panel2.position.set(-2.6, 0, 0);

            // Communication Dish
            const dish = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.2, 0.2, 32), matDark);
            dish.rotation.x = Math.PI / 2;
            dish.position.z = 0.85;
            
            const antenna = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.6, 8), matAccent);
            antenna.rotation.x = Math.PI / 2;
            antenna.position.z = 1.2;

            group.add(bus, panel1, panel2, dish, antenna);
            group.rotation.order = "YXZ";
            return group;
        }

        function createRocket() {
            const group = new THREE.Group();
            
            // Main Body
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 4, 32), matBody);
            body.rotation.x = Math.PI / 2;
            
            // Nosecone (Fixed the inversion by changing rotation to -Math.PI / 2)
            const nose = new THREE.Mesh(new THREE.ConeGeometry(0.4, 1.2, 32), matDark);
            nose.rotation.x = -Math.PI / 2; 
            nose.position.z = -2.6;
            
            // Engine Nozzle
            const nozzle = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.15, 0.5, 16), matDark);
            nozzle.rotation.x = Math.PI / 2;
            nozzle.position.z = 2.25;

            // Aerodynamic Fins
            for(let i=0; i<4; i++) {
                const fin = new THREE.Mesh(new THREE.BoxGeometry(0.05, 1.2, 1), matAccent);
                fin.position.set(0, 0.6, 1.5);
                const finPivot = new THREE.Group();
                finPivot.add(fin);
                finPivot.rotation.z = (Math.PI / 2) * i;
                group.add(finPivot);
            }

            group.add(body, nose, nozzle);
            group.rotation.order = "YXZ";
            return group;
        }

        function createSlab() {
            const group = new THREE.Group();
            
            // Breadboard Base
            const breadboard = new THREE.Mesh(new THREE.BoxGeometry(4.5, 0.2, 3), matBody);
            
            // STM32 Blue Pill Board
            const bluePill = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.05, 1.2), matPCBBlue);
            bluePill.position.set(-0.5, 0.15, -0.5);
            
            // Main Microcontroller Chip
            const stmChip = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.05, 0.6), matDark);
            stmChip.position.set(-0.5, 0.2, -0.5);

            // ST-Link Gold Header Pins
            const pins = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.8), matGold);
            pins.position.set(0.7, 0.2, -0.5);
            
            // MPU6050 Module
            const mpuBoard = new THREE.Mesh(new THREE.BoxGeometry(1, 0.05, 0.8), matAccent);
            mpuBoard.position.set(0.5, 0.15, 0.8);
            
            // MPU Sensor Chip
            const mpuChip = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.05, 0.3), matDark);
            mpuChip.position.set(0.5, 0.2, 0.8);

            group.add(breadboard, bluePill, stmChip, pins, mpuBoard, mpuChip);
            group.rotation.order = "YXZ";
            return group;
        }

        let currentModel = createDrone();
        scene.add(currentModel);

        document.getElementById('modelSelect').addEventListener('change', (e) => {
            scene.remove(currentModel);
            if (e.target.value === 'drone') currentModel = createDrone();
            if (e.target.value === 'satellite') currentModel = createSatellite(); // Updated
            if (e.target.value === 'rocket') currentModel = createRocket();
            if (e.target.value === 'slab') currentModel = createSlab();
            scene.add(currentModel);
        });

        let isReceivingData = false;
        function animate() {
            requestAnimationFrame(animate);
            if (!isReceivingData) {
                currentModel.rotation.y += 0.003; 
                currentModel.rotation.x += 0.002;
            }
            renderer.render(scene, camera);
        }
        animate();

        // --- 2. SETUP FLUID GRAPHS ---
        Chart.defaults.font.family = "'Inter', sans-serif";
        const maxDataPoints = 60; 
        
        function createChart(canvasId) {
            return new Chart(document.getElementById(canvasId).getContext('2d'), {
                type: 'line',
                data: { 
                    labels: Array(maxDataPoints).fill(''), 
                    datasets: [{ 
                        data: Array(maxDataPoints).fill(0), 
                        borderColor: '#22d3ee', 
                        backgroundColor: 'rgba(34, 211, 238, 0.05)', 
                        tension: 0.4, 
                        borderWidth: 2, 
                        pointRadius: 0,
                        fill: true
                    }] 
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    animation: false, 
                    plugins: { legend: { display: false }, tooltip: { enabled: false } },
                    scales: { 
                        y: { 
                            suggestedMin: -90, suggestedMax: 90, 
                            grid: { display: false }, 
                            ticks: { display: false } 
                        }, 
                        x: { display: false } 
                    } 
                }
            });
        }

        const chartP = createChart('chartPitch');
        const chartR = createChart('chartRoll');
        const chartY = createChart('chartYaw');

        function updateCharts(p, r, y) {
            [chartP, chartR, chartY].forEach((chart, index) => {
                const val = index === 0 ? p : (index === 1 ? r : y);
                chart.data.datasets[0].data.push(val);
                chart.data.datasets[0].data.shift();
                chart.update();
            });
            
            document.getElementById('valPitch').innerText = p.toFixed(1) + '°';
            document.getElementById('valRoll').innerText  = r.toFixed(1) + '°';
            document.getElementById('valYaw').innerText   = y.toFixed(1) + '°';
        }

        // --- 3. MATH & HARDWARE BRIDGE ---
        let pitchOffset = 0, rollOffset = 0, yawOffset = 0;
        let needsCalibration = true; 
        
        let smoothedPitch = 0, smoothedRoll = 0, smoothedYaw = 0;
        const filterAlpha = 0.45; 

        function wrapAngle(target, current) {
            let diff = target - current;
            while (diff > 180) diff -= 360;
            while (diff < -180) diff += 360;
            return diff;
        }

        document.getElementById('btnCalibrate').addEventListener('click', () => { needsCalibration = true; });

        document.getElementById('btnConnect').addEventListener('click', async () => {
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                
                const btn = document.getElementById('btnConnect');
                btn.innerText = "LINK ESTABLISHED";
                btn.className = ""; 
                btn.disabled = true;
                
                document.getElementById('statusIndicator').classList.add('active');
                document.getElementById('btnCalibrate').style.display = "block"; 

                const textDecoder = new TextDecoderStream();
                const readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
                const reader = textDecoder.readable.getReader();

                let buffer = "";
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    buffer += value;
                    let lines = buffer.split('\n');
                    buffer = lines.pop(); 

                    for (let line of lines) {
                        let data = line.trim().split(',');
                        if (data.length === 3) {
                            let rawPitch = parseFloat(data[0]);
                            let rawRoll = parseFloat(data[1]);
                            let rawYaw = parseFloat(data[2]);

                            if(!isNaN(rawPitch) && !isNaN(rawRoll)) {
                                isReceivingData = true; 
                                
                                if (needsCalibration) {
                                    pitchOffset = rawPitch;
                                    rollOffset = rawRoll;
                                    yawOffset = rawYaw;
                                    smoothedPitch = 0; smoothedRoll = 0; smoothedYaw = 0;
                                    needsCalibration = false;
                                }

                                let displayPitch = rawPitch - pitchOffset;
                                let displayRoll = rawRoll - rollOffset;
                                let displayYaw = rawYaw - yawOffset;

                                smoothedPitch += filterAlpha * wrapAngle(displayPitch, smoothedPitch);
                                smoothedRoll += filterAlpha * wrapAngle(displayRoll, smoothedRoll);
                                smoothedYaw += filterAlpha * wrapAngle(displayYaw, smoothedYaw);

                                currentModel.rotation.set(0, 0, 0); 
                                currentModel.rotation.x = smoothedPitch * (Math.PI / 180);
                                currentModel.rotation.z = -smoothedRoll * (Math.PI / 180); 
                                currentModel.rotation.y = smoothedYaw * (Math.PI / 180); 

                                updateCharts(smoothedPitch, smoothedRoll, smoothedYaw);
                            }
                        }
                    }
                }
            } catch (err) {
                console.error("Connection error: ", err);
            }
        });
    </script>
</body>
</html>
